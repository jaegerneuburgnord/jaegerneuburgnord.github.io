<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Wiesen-Karte – nicht mehr verfügbar</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .box {
      max-width: 480px;
      padding: 2rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { font-size: 1.3rem; color: #4CAF50; }
    #status { font-size: 0.85rem; color: #888; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Wiesen-Karte</h1>
    <p>Diese Anwendung wurde vom Netz genommen und ist nicht mehr verfügbar.</p>
    <p id="status">Lokale Daten werden bereinigt&hellip;</p>
  </div>
  <script>
    (async function wipe() {
      const status = document.getElementById('status');
      try {
        // 1. Service Worker deregistrieren
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        // 2. Cache Storage (Offline-Kopien der App und Kartendaten) löschen
        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(names.map(n => caches.delete(n)));
        }
        // 3. Web Storage löschen
        try { localStorage.clear(); } catch (e) {}
        try { sessionStorage.clear(); } catch (e) {}
        // 4. IndexedDB löschen (defensiv, auch wenn die App sie nicht nutzt)
        if ('indexedDB' in window && indexedDB.databases) {
          const dbs = await indexedDB.databases();
          await Promise.all(dbs.map(db => new Promise(resolve => {
            const req = indexedDB.deleteDatabase(db.name);
            req.onsuccess = req.onerror = req.onblocked = resolve;
          })));
        }
        status.textContent = 'Lokale Daten wurden entfernt.';
      } catch (e) {
        status.textContent = 'Bereinigung teilweise fehlgeschlagen: ' + e.message;
      }
    })();
  </script>
</body>
</html>
